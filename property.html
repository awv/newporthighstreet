<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property History | Newport Cornucopia</title>
    <link rel="stylesheet" href="assets/css/wiki.css">
    <link rel="stylesheet" href="https://use.typekit.net/lko4kva.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="wiki-view">
    <nav class="wiki-nav">
        <a href="index.html">← BACK TO HIGH STREET MAP</a>
    </nav>

    <main class="wiki-container">
        <header class="wiki-header">
            <div class="number-block">
                <h1 id="bldg-number">--</h1>
            </div>
        </header>

        <article class="wiki-content-area">
            <aside id="property-infobox" class="property-infobox" style="display: none;">
                <div id="bldg-status" class="status-badge"></div>
                <div id="infobox-photo" class="infobox-photo"></div>
                <h3>Fast Facts</h3>
                <table id="infobox-table"></table>
            </aside>

            <div id="property-content"></div>

            <section id="adverts-section" style="display: none;" class="wiki-section">
                <h2>Adverts & Clippings</h2>
                <div id="adverts-gallery" class="wiki-grid"></div>
            </section>

            <section id="present-section" style="display: none;" class="wiki-section">
                <h2>Historical Photos</h2>
                <div id="present-gallery" class="wiki-grid"></div>
            </section>
        </article>
    </main>

    <div id="wiki-lightbox" class="wiki-lightbox-overlay" onclick="closeWikiLightbox()">
        <span class="close-btn">&times;</span>
        <div class="lightbox-content">
            <img id="wiki-lightbox-img" src="">
            <p id="wiki-lightbox-caption"></p>
        </div>
    </div>

    <script src="assets/js/wiki.js"></script>
</body>
</html>
