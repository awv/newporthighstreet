<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newport High Street: Mobile Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Georgia&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #e5a813; 
            --bg: #f4f1ea; 
            --text: #1a1a1a; 
            --grey: #888;
        }
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); 
            line-height: 1.6; padding-bottom: 80px;
        }

        /* HEADER */
        header { 
            background: #000; color: var(--gold); padding: 30px 20px; 
            text-align: center; border-bottom: 4px solid var(--gold);
        }
        .header-title { font-family: 'Playfair Display', serif; margin: 0; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        .header-dates { display: block; font-size: 0.8rem; font-weight: 600; color: #fff; margin-top: 5px; opacity: 0.8; letter-spacing: 3px; }

        /* SEARCH AREA */
        .search-container { padding: 40px 20px; background: #fff; border-bottom: 1px solid #d1cdc2; }
        .input-wrapper { 
            display: flex; max-width: 400px; margin: 0 auto; 
            border: 2px solid #000; border-radius: 6px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input { 
            flex: 1; padding: 15px; border: none; font-size: 1rem; font-weight: 600; outline: none; font-family: 'Montserrat', sans-serif;
        }
        .go-btn { 
            background: var(--gold); border: none; padding: 0 25px; color: #fff;
            font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.9rem;
        }

        /* RESULTS */
        #results { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* THE HERITAGE PLAQUE STYLE */
        .plaque-container {
            margin: 30px 0 60px;
            display: flex;
            justify-content: center;
        }
        .heritage-plaque { 
            background: var(--bg);
            padding: 10px 30px;
            border: 1px solid var(--gold);
            outline: 3px solid var(--bg); /* Creates a gap between borders */
            box-shadow: 0 0 0 4px var(--gold); /* The outer frame */
            display: inline-block;
        }
        .property-label { 
            font-family: 'Playfair Display', serif; 
            font-size: 2rem; 
            font-style: italic; 
            margin: 0; 
            color: #000;
            text-transform: lowercase;
        }

        /* TIMELINE */
        .timeline { position: relative; padding-left: 50px; }
        .timeline::before { 
            content: ''; position: absolute; left: 19px; top: 0; bottom: 0; 
            width: 2px; background: var(--gold); opacity: 0.4; 
        }

        /* ENTRIES */
        .entry { position: relative; margin-bottom: 50px; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #e2ded5; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        
        /* CENTERED DOT */
        .entry::after { 
            content: ''; position: absolute; left: -41px; top: 35px; 
            width: 16px; height: 16px; background: var(--gold); 
            border-radius: 50%; border: 4px solid var(--bg); z-index: 2;
        }
        
        .year-range { font-size: 0.8rem; font-weight: 700; color: var(--gold); margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .biz-name { font-family: 'Georgia', serif; font-size: 1.4rem; font-weight: 900; margin: 0; color: #111; }
        .biz-trade { font-size: 0.85rem; font-style: italic; color: var(--grey); font-family: 'Georgia', serif; margin-bottom: 15px; display: block; }
        .biz-desc { font-size: 0.95rem; color: #444; margin-top: 20px; border-top: 1px solid #f0f0f0; padding-top: 15px; line-height: 1.7; }

        .researching { background: none; border: 2px dashed #d1cdc2; box-shadow: none; opacity: 0.8; }
        .researching::after { background: var(--grey); }
    </style>
</head>
<body>

    <header>
        <div class="header-title">Newport High Street</div>
        <span class="header-dates">1830 — 2026</span>
    </header>

    <div class="search-container">
        <div class="input-wrapper">
            <input type="text" id="propertyInput" placeholder="Enter building number (e.g. 8)" autofocus>
            <button class="go-btn" onclick="lookupHistory()">Go</button>
        </div>
    </div>

    <div id="results" style="text-align: center;">
        <!-- Records load here -->
    </div>

<script src="assets/js/data.js"></script>

<script>
    function lookupHistory() {
        const input = document.getElementById('propertyInput').value.trim();
        const resultsArea = document.getElementById('results');
        if (!input) return;

        resultsArea.innerHTML = '';
        const searchTag = input.toLowerCase().startsWith('no.') ? input : `No. ${input}`;
        const data = historyData.filter(d => d.Address.toLowerCase() === searchTag.toLowerCase());

        if (data.length === 0) {
            resultsArea.innerHTML = '<p style="color: #999; margin-top: 30px; font-weight: 600;">No historical records found for this property.</p>';
            return;
        }

        // LATEST DATES FIRST
        data.sort((a, b) => b.Start_Year - a.Start_Year);

        resultsArea.innerHTML = `
            <div class="plaque-container">
                <div class="heritage-plaque">
                    <h2 class="property-label">no. ${input}</h2>
                </div>
            </div>
            <div class="timeline" id="timelineList" style="text-align: left;"></div>
        `;
        
        const list = document.getElementById('timelineList');

        data.forEach(record => {
            const isUnknown = record.Status === "Researching" || record.Business_Name.toLowerCase() === "unknown";
            const entryDiv = document.createElement('div');
            entryDiv.className = `entry ${isUnknown ? 'researching' : ''}`;
            
            entryDiv.innerHTML = `
                <span class="year-range">${record.Start_Year} — ${record.End_Year}</span>
                <h3 class="biz-name">${record.Business_Name}</h3>
                <span class="biz-trade">${record.Business_Type}</span>
                ${record.Description ? `<p class="biz-desc">${record.Description}</p>` : ''}
            `;
            list.appendChild(entryDiv);
        });
    }

    document.getElementById('propertyInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') lookupHistory();
    });
</script>

</body>
</html>
